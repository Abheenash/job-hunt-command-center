name: pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  iac:
    name: IaC scan (Checkov + tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov (hard gate, documented baseline)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          quiet: true
          soft_fail: false
          # Reviewed, accepted trade-offs for a single-user free-tier tool.
          # Rationale for each is documented in .checkov.yaml. A NEW finding
          # outside this list still fails the build.
          skip_check: CKV2_AWS_51,CKV_AWS_68,CKV_AWS_86,CKV_AWS_310,CKV2_AWS_47,CKV2_AWS_29,CKV_AWS_76,CKV_AWS_225,CKV_AWS_120,CKV_AWS_18,CKV_AWS_144,CKV2_AWS_62,CKV_AWS_21,CKV_AWS_145,CKV_AWS_119,CKV_AWS_26,CKV_AWS_50,CKV_AWS_115,CKV_AWS_116,CKV_AWS_117,CKV_AWS_173,CKV_AWS_272,CKV_AWS_158,CKV_AWS_338,CKV_AWS_342,CKV2_AWS_67,CKV2_AWS_32,CKV2_AWS_42,CKV2_AWS_57,CKV2_AWS_61,CKV_AWS_149,CKV_AWS_174,CKV_AWS_374,CKV_VALIDATE_SECRETS
      - name: tfsec (advisory)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          soft_fail: true

  deps:
    name: Vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  test:
    name: Unit tests (classifier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pytest boto3 # boto3: scanner/enrich test modules import it at load
      - name: Classifier tests
        working-directory: src/classify
        run: python -m pytest -q
      - name: Résumé renderer tests
        working-directory: src/resume_gen
        run: python -m pytest -q
      - name: Scanner tests
        working-directory: src/scanner
        run: python -m pytest -q
      - name: Enrich tests
        working-directory: src/enrich
        run: python -m pytest -q

  validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

# Checkov baseline — reviewed skips for a single-user, free-tier personal tool.
# Each is a deliberate cost/scope decision, not an oversight. Documented so the
# gate stays meaningful (a NEW finding still fails the build).
skip-check:
  # --- cost / scope: WAF, access logging, replication not warranted here ------
  - CKV2_AWS_51   # CloudFront WAF — no WAF ($ + not needed for a personal app)
  - CKV_AWS_68    # CloudFront WAF
  - CKV_AWS_86    # CloudFront access logging
  - CKV_AWS_310   # CloudFront origin failover (single origin)
  - CKV2_AWS_47   # CloudFront + WAFv2
  - CKV2_AWS_29   # API Gateway WAF
  - CKV_AWS_76    # API Gateway access logging
  - CKV_AWS_225   # API Gateway cache
  - CKV_AWS_120   # API Gateway cache enabled
  - CKV_AWS_18    # S3 access logging
  - CKV_AWS_144   # S3 cross-region replication
  - CKV2_AWS_62   # S3 event notifications
  - CKV_AWS_21    # S3 versioning (site bucket is static assets; docs bucket IS versioned)
  # --- encryption: SSE-S3 / AWS-managed keys are sufficient (no CMK $/mo) ------
  - CKV_AWS_145   # S3 SSE-KMS (using SSE-S3/AES256 by choice)
  - CKV_AWS_119   # DynamoDB CMK (default at-rest encryption)
  # --- Lambda hardening not warranted for a low-traffic personal tool ---------
  - CKV_AWS_50    # Lambda X-Ray tracing
  - CKV_AWS_115   # Lambda reserved concurrency
  - CKV_AWS_116   # Lambda DLQ
  - CKV_AWS_117   # Lambda in VPC
  - CKV_AWS_173   # Lambda env var KMS encryption
  - CKV_AWS_272   # Lambda code signing
  # --- CloudWatch logs: default retention/encryption acceptable ---------------
  - CKV_AWS_158   # CloudWatch log group KMS
  - CKV_AWS_338   # CloudWatch log retention >= 1yr
  # --- Cognito: single user, no need for advanced MFA/WAF ----------------------
  - CKV_AWS_342   # Cognito MFA (single-user tool)
  - CKV2_AWS_67   # Secrets Manager automatic rotation (App Password, rotated manually)
